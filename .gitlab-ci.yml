# GitLab CI/CD Pipeline — Calculadora Orçamentária (Tauri v2)
#
# Stages:
#   1. test     — TypeScript check + Rust check
#   2. build    — Build de produção para macOS e Windows
#   3. release  — Publica artefatos (instaladores)
#
# Runners necessários:
#   - Docker runner (tag: docker) — para testes e release
#   - Runner macOS (tag: macos) — para build macOS [opcional]
#   - Runner Windows (tag: windows) — para build Windows [opcional]

variables:
  NODE_VERSION: "20"

stages:
  - test
  - build
  - release

# ============================================================
# STAGE: test
# ============================================================

test:typescript:
  stage: test
  tags:
    - docker
  image: node:${NODE_VERSION}-alpine
  before_script:
    - df -h / | tail -1
    - npm install --no-audit --no-fund --prefer-offline || { echo "npm install failed - likely disk full"; exit 1; }
  script:
    - ./node_modules/.bin/tsc --noEmit
    - echo "--- TypeScript check passed ---"
    - ./node_modules/.bin/vite build
    - echo "--- Vite build passed ---"

test:rust:
  stage: test
  tags:
    - docker
  image: rust:1.82-bookworm
  before_script:
    - rustup default stable
    - apt-get update -qq && apt-get install -y -qq
      pkg-config
      libssl-dev
      libwebkit2gtk-4.1-dev
      libayatana-appindicator3-dev
      librsvg2-dev
      libsoup-3.0-dev
      libjavascriptcoregtk-4.1-dev
  script:
    - cd src-tauri
    - cargo check --release
    - echo "--- Rust check passed ---"

# ============================================================
# STAGE: build — macOS (requer runner com tag 'macos')
# ============================================================

build:macos:
  stage: build
  tags:
    - macos
  needs:
    - test:typescript
  allow_failure: true
  before_script:
    - |
      if ! command -v rustup &> /dev/null; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      fi
    - source "$HOME/.cargo/env" || true
    - rustup default stable
    - rustup target add aarch64-apple-darwin
    - rustup target add x86_64-apple-darwin
    - |
      if ! command -v node &> /dev/null; then
        brew install node@${NODE_VERSION} 2>/dev/null || true
      fi
    - node --version
    - npm ci --prefer-offline
  script:
    - echo "--- Building macOS (Apple Silicon) ---"
    - npm run tauri build -- --target aarch64-apple-darwin
    - echo "--- Building macOS (Intel) ---"
    - npm run tauri build -- --target x86_64-apple-darwin
  artifacts:
    name: "orcamento-macos-${CI_COMMIT_SHORT_SHA}"
    paths:
      - src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
      - src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ============================================================
# STAGE: build — Windows (requer runner com tag 'windows')
# ============================================================

build:windows:
  stage: build
  tags:
    - windows
  needs:
    - test:typescript
  allow_failure: true
  before_script:
    - |
      if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
        Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
        .\rustup-init.exe -y --default-toolchain stable
        Remove-Item rustup-init.exe
      }
    - $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
    - rustup default stable
    - |
      if (-not (Get-Command node -ErrorAction SilentlyContinue)) {
        choco install nodejs-lts -y --no-progress
        refreshenv
      }
    - node --version
    - npm ci --prefer-offline
  script:
    - echo "--- Building Windows (x64) ---"
    - npm run tauri build
  artifacts:
    name: "orcamento-windows-${CI_COMMIT_SHORT_SHA}"
    paths:
      - src-tauri/target/release/bundle/msi/*.msi
      - src-tauri/target/release/bundle/nsis/*.exe
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ============================================================
# STAGE: release — Publicar artefatos em tag
# ============================================================

release:publish:
  stage: release
  tags:
    - docker
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:macos
      optional: true
    - job: build:windows
      optional: true
  script:
    - echo "Publicando release ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Calculadora Orçamentária $CI_COMMIT_TAG"
    description: |
      Instaladores da Calculadora Orçamentária versão $CI_COMMIT_TAG.

      Baixe os artefatos dos jobs de build no pipeline.
  rules:
    - if: $CI_COMMIT_TAG
