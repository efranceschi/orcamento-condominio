# GitLab CI/CD Pipeline - Sistema de Orçamento
variables:
  IMAGE_NAME: "orcamento-flores"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

stages:
  - test
  - build
  - deploy

# Test stage - validate Python code and run test suite
test:syntax-check:
  stage: test
  image: python:3.13-slim
  tags:
    - docker
    - dev
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - echo "🧪 Validating Python syntax..."
    - python -m py_compile main.py
    - echo "✅ Python syntax is valid"
    - echo "🔍 Checking required files..."
    - test -f docker/nginx.conf && echo "✅ Nginx config found"
    - test -f docker/supervisord.conf && echo "✅ Supervisor config found"
    - test -f requirements.txt && echo "✅ Requirements file found"
    - echo "✅ All required files are present"
  cache:
    paths:
      - .cache/pip

test:unit-tests:
  stage: test
  image: python:3.13-slim
  tags:
    - docker
    - dev
  before_script:
    - apt-get update -qq && apt-get install -y -qq sqlite3
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - echo "🧪 Running test suite..."
    - pytest -v --tb=short --junitxml=report.xml --cov=app --cov-report=xml --cov-report=html --cov-report=term
    - echo "✅ All tests passed!"
    - echo ""
    - echo "📊 Test Coverage Summary:"
    - coverage report --skip-empty
  after_script:
    - echo "📈 Test execution completed"
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    paths:
      - htmlcov/
      - report.xml
      - coverage.xml
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days
  cache:
    paths:
      - .cache/pip

# Build stage - create Docker image (only on version tags)
build:
  stage: build
  image: docker:stable
  tags:
    - docker
    - dev
  services:
    - name: docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD https://$CI_REGISTRY
    - docker info
  script:
    - echo "🔨 Building Docker image for version $CI_COMMIT_TAG..."
    - |
      # Extract version from tag (removes 'v' prefix)
      VERSION=${CI_COMMIT_TAG#v}
      
      # Generate image tags
      IMAGE_TAG_VERSION="$CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/$IMAGE_NAME:$VERSION"
      IMAGE_TAG_TAG="$CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/$IMAGE_NAME:$CI_COMMIT_TAG"
      IMAGE_TAG_LATEST="$CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/$IMAGE_NAME:latest"
      
      echo "Building version: $VERSION"
      echo "Building with tags:"
      echo "  - $IMAGE_TAG_VERSION"
      echo "  - $IMAGE_TAG_TAG"
      echo "  - $IMAGE_TAG_LATEST"
      
      # Build image with version as build arg
      docker build \
        --build-arg APP_VERSION=$CI_COMMIT_TAG \
        -t $IMAGE_TAG_VERSION \
        -t $IMAGE_TAG_TAG \
        -t $IMAGE_TAG_LATEST .
      
      # Push all tags
      echo "📤 Pushing images to registry..."
      docker push $IMAGE_TAG_VERSION
      docker push $IMAGE_TAG_TAG
      docker push $IMAGE_TAG_LATEST
      
      echo "✅ Images pushed successfully!"
      echo "✅ Version $CI_COMMIT_TAG deployed"
  after_script:
    - docker logout $DOCKER_REGISTRY
  only:
    - /^v\d+\.\d+\.\d+.*$/  # Apenas tags que começam com v seguido de versão semântica

# Cache configuration
cache:
  paths:
    - .docker/
