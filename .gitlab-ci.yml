# GitLab CI/CD Pipeline — Calculadora Orçamentária (Tauri v2)
#
# Stages:
#   1. test     — TypeScript check + Rust check
#   2. build    — Build de produção para macOS e Windows
#   3. release  — Publica artefatos (instaladores)

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"
  NODE_VERSION: "20"

stages:
  - test
  - build
  - release

# ============================================================
# Cache compartilhado
# ============================================================

.node-cache: &node-cache
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
  policy: pull-push

.cargo-cache: &cargo-cache
  key:
    files:
      - src-tauri/Cargo.lock
  paths:
    - .cargo/registry/
    - .cargo/git/
    - src-tauri/target/
  policy: pull-push

# ============================================================
# STAGE: test
# ============================================================

test:typescript:
  stage: test
  tags:
    - docker
  image: node:${NODE_VERSION}-slim
  cache:
    - <<: *node-cache
  script:
    - npm ci --prefer-offline
    - echo "--- TypeScript type check ---"
    - npx tsc --noEmit
    - echo "--- Vite build check ---"
    - npx vite build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

test:rust:
  stage: test
  tags:
    - docker
  image: rust:1.82-slim
  cache:
    - <<: *cargo-cache
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq pkg-config libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev > /dev/null 2>&1 || true
  script:
    - cd src-tauri
    - cargo check --release 2>&1
    - echo "--- Rust check passed ---"
  allow_failure: false

# ============================================================
# STAGE: build — macOS
# ============================================================

build:macos:
  stage: build
  tags:
    - macos
  needs:
    - test:typescript
  cache:
    - <<: *node-cache
    - <<: *cargo-cache
  before_script:
    # Instalar Rust se não disponível
    - |
      if ! command -v rustup &> /dev/null; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      fi
    - source "$HOME/.cargo/env" || true
    - rustup default stable
    - rustup update stable
    # Targets para Intel e Apple Silicon
    - rustup target add aarch64-apple-darwin
    - rustup target add x86_64-apple-darwin
    # Node.js
    - |
      if ! command -v node &> /dev/null; then
        curl -fsSL https://deb.nodesource.com/setup_${NODE_VERSION}.x | bash - || true
        brew install node@${NODE_VERSION} 2>/dev/null || true
      fi
    - node --version
    - npm ci --prefer-offline
  script:
    # Build universal macOS (arm64 + x86_64)
    - echo "--- Building macOS (Apple Silicon) ---"
    - npm run tauri build -- --target aarch64-apple-darwin
    - echo "--- Building macOS (Intel) ---"
    - npm run tauri build -- --target x86_64-apple-darwin
  artifacts:
    name: "orcamento-macos-${CI_COMMIT_SHORT_SHA}"
    paths:
      - src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
      - src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
      - src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
      - src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ============================================================
# STAGE: build — Windows
# ============================================================

build:windows:
  stage: build
  tags:
    - windows
  needs:
    - test:typescript
  cache:
    - <<: *node-cache
    - <<: *cargo-cache
  before_script:
    # Instalar Rust se não disponível
    - |
      if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
        Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
        .\rustup-init.exe -y --default-toolchain stable
        Remove-Item rustup-init.exe
      }
    - $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
    - rustup default stable
    - rustup update stable
    # Node.js — assume que está no runner ou instalar via choco
    - |
      if (-not (Get-Command node -ErrorAction SilentlyContinue)) {
        choco install nodejs-lts -y --no-progress
        refreshenv
      }
    - node --version
    - npm ci --prefer-offline
  script:
    - echo "--- Building Windows (x64) ---"
    - npm run tauri build
  artifacts:
    name: "orcamento-windows-${CI_COMMIT_SHORT_SHA}"
    paths:
      - src-tauri/target/release/bundle/msi/*.msi
      - src-tauri/target/release/bundle/nsis/*.exe
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ============================================================
# STAGE: release — Publicar artefatos em tag
# ============================================================

release:publish:
  stage: release
  tags:
    - docker
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:macos
      artifacts: true
    - job: build:windows
      artifacts: true
  script:
    - echo "Publicando release ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Calculadora Orçamentária $CI_COMMIT_TAG"
    description: |
      Instaladores da Calculadora Orçamentária versão $CI_COMMIT_TAG.

      **macOS:**
      - `.dmg` (Apple Silicon — aarch64)
      - `.dmg` (Intel — x86_64)

      **Windows:**
      - `.msi` (instalador MSI)
      - `.exe` (instalador NSIS)
    assets:
      links:
        - name: "macOS (Apple Silicon) .dmg"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Calculadora Orçamentária_${CI_COMMIT_TAG}_aarch64.dmg"
          link_type: package
        - name: "macOS (Intel) .dmg"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/Calculadora Orçamentária_${CI_COMMIT_TAG}_x64.dmg"
          link_type: package
        - name: "Windows .msi"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/src-tauri/target/release/bundle/msi/Calculadora Orçamentária_${CI_COMMIT_TAG}_x64_en-US.msi"
          link_type: package
        - name: "Windows .exe"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/src-tauri/target/release/bundle/nsis/Calculadora Orçamentária_${CI_COMMIT_TAG}_x64-setup.exe"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG
