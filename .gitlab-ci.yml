# GitLab CI/CD Pipeline — Calculadora Orçamentária (Tauri v2)
#
# Stages:
#   1. test — TypeScript check, Rust check, testes e2e
#
# Runner necessário:
#   - Docker runner (tag: docker)

variables:
  NODE_VERSION: "20"

stages:
  - test

# ============================================================
# TypeScript — type check + vite build
# ============================================================

test:typescript:
  stage: test
  tags:
    - docker
  image: node:${NODE_VERSION}-bookworm-slim
  variables:
    NODE_OPTIONS: "--max-old-space-size=4096"
    npm_config_fund: "false"
    npm_config_audit: "false"
    npm_config_loglevel: "error"
  before_script:
    - node --version
    - npm --version
    - npm cache clean --force
    - npm install --legacy-peer-deps
  script:
    - ./node_modules/.bin/tsc --noEmit
    - echo "--- TypeScript check passed ---"
    - ./node_modules/.bin/vite build
    - echo "--- Vite build passed ---"

# ============================================================
# Rust — cargo check + testes de integração
# ============================================================

test:rust:
  stage: test
  tags:
    - docker
  image: rust:1.82-bookworm
  before_script:
    - rustup default stable
    - apt-get update -qq
    - apt-get install -y -qq pkg-config libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
  script:
    - cd src-tauri
    - cargo check --release
    - echo "--- Rust check passed ---"
    - cargo test --release
    - echo "--- Rust tests passed ---"
