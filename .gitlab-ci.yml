# GitLab CI/CD Pipeline - Sistema de Orçamento
variables:
  IMAGE_NAME: "orcamento-flores"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

stages:
  - test
  - build
  - deploy

# Test stage - validate Python code and configurations
test:
  stage: test
  image: python:3.13-slim
  tags:
    - docker
    - dev
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - echo "🧪 Testing Python application..."
    - python -m py_compile main.py
    - echo "✅ Python syntax is valid"
    - echo "🔍 Checking required files..."
    - test -f docker/nginx.conf && echo "✅ Nginx config found"
    - test -f docker/supervisord.conf && echo "✅ Supervisor config found"
    - test -f requirements.txt && echo "✅ Requirements file found"
    - echo "✅ All required files are present"
  cache:
    paths:
      - .cache/pip
  only:
    - branches
  except:
    - tags

# Build stage - create Docker image
build:
  stage: build
  image: docker:stable
  tags:
    - docker
    - dev
  services:
    - name: docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD https://$CI_REGISTRY
    - docker info
  script:
    - echo "🔨 Building Docker image..."
    - |
      # Generate image tags
      IMAGE_TAG_COMMIT="$CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
      IMAGE_TAG_BRANCH="$CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/$IMAGE_NAME:$CI_COMMIT_REF_SLUG"
      IMAGE_TAG_LATEST="$CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/$IMAGE_NAME:latest"
      
      echo "Building with tags:"
      echo "  - $IMAGE_TAG_COMMIT"
      echo "  - $IMAGE_TAG_BRANCH"
      echo "  - $IMAGE_TAG_LATEST"
      
      # Build image
      docker build -t $IMAGE_TAG_COMMIT -t $IMAGE_TAG_BRANCH -t $IMAGE_TAG_LATEST .
      
      # Push all tags
      echo "📤 Pushing images to registry..."
      docker push $IMAGE_TAG_COMMIT
      docker push $IMAGE_TAG_BRANCH
      docker push $IMAGE_TAG_LATEST
      
      echo "✅ Images pushed successfully!"
  after_script:
    - docker logout $DOCKER_REGISTRY
  only:
    - branches
  except:
    - tags

# Cache configuration
cache:
  paths:
    - .docker/
