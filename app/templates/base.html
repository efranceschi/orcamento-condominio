<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Calculadora Orçamentária{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon.png">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* Password field with toggle icon */
        .password-field-wrapper {
            position: relative;
        }

        .password-toggle-icon {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.25rem;
            user-select: none;
            color: #6b7280;
            transition: color 0.2s;
        }

        .password-toggle-icon:hover {
            color: #374151;
        }

        .password-field-wrapper .form-input {
            padding-right: 3rem;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="/" class="navbar-brand">
                <img src="/static/favicon.svg" alt="$" class="navbar-icon"> Calculadora Orçamentária
            </a>
            <div style="display: flex; align-items: center; gap: 0;">
                <ul class="navbar-nav">
                    <li><a href="/scenarios" class="nav-link {% if '/scenarios' in request.url.path %}active{% endif %}">Orçamentos</a></li>
                    <li><a href="/categories" class="nav-link {% if '/categories' in request.url.path %}active{% endif %}">Categorias</a></li>
                    <li><a href="/parameters" class="nav-link {% if '/parameters' in request.url.path %}active{% endif %}">Parâmetros</a></li>
                </ul>
                
                <!-- Separador vertical -->
                <div class="navbar-divider"></div>
                
                <!-- Menu do usuário -->
                <div id="user-menu" class="user-menu" style="display: none;">
                    <button class="user-menu-button" onclick="toggleUserMenu()">
                        <div class="user-menu-info">
                            <span class="user-menu-role" id="user-role-display">Usuário</span>
                            <span class="user-menu-name" id="user-name-display">...</span>
                        </div>
                        <span class="user-menu-icon">▼</span>
                    </button>
                    
                    <div class="user-menu-dropdown">
                        <a href="/users" id="users-menu-link" class="user-menu-dropdown-item" style="display: none;">
                            👥 Gerenciar Usuários
                        </a>
                        <div id="users-menu-divider" class="user-menu-dropdown-divider" style="display: none;"></div>
                        <button class="user-menu-dropdown-item" onclick="openChangePasswordModal()">
                            🔑 Trocar Senha
                        </button>
                        <div class="user-menu-dropdown-divider"></div>
                        <button class="user-menu-dropdown-item danger" onclick="logout()">
                            🚪 Sair
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Modal de Trocar Senha -->
    <div class="modal" id="change-password-modal">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2 class="modal-title">Trocar Senha</h2>
                <button class="modal-close" onclick="closeChangePasswordModal()">&times;</button>
            </div>
            
            <form id="change-password-form" onsubmit="changePassword(event)">
                <div class="form-group">
                    <label for="current-password" class="form-label">Senha Atual *</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="current-password" class="form-input" required autofocus>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="new-password" class="form-label">Nova Senha *</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="new-password" class="form-input" required minlength="8">
                        <span class="password-toggle-icon" id="change-pass-toggle" onclick="toggleChangePasswordVisibility()" title="Mostrar/Ocultar senha">
                            👁️
                        </span>
                    </div>
                    <small style="color: #6b7280;">Mínimo 8 caracteres, incluindo letras, números e caractere especial</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm-new-password" class="form-label">Confirmar Nova Senha *</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="confirm-new-password" class="form-input" required minlength="8">
                        <span class="password-toggle-icon" onclick="toggleChangePasswordVisibility()" title="Mostrar/Ocultar senha">
                            👁️
                        </span>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" onclick="closeChangePasswordModal()" class="btn btn-secondary">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Alterar Senha
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <!-- Scripts -->
    <script src="/static/js/api.js"></script>
    <script>
        // Verificar autenticação e configurar UI
        (function() {
            const currentPath = window.location.pathname;
            
            // Páginas que não requerem autenticação
            if (currentPath === '/login') {
                return;
            }
            
            const token = localStorage.getItem('access_token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            // Redirecionar para login se não estiver autenticado
            if (!token) {
                window.location.href = '/login';
                return;
            }
            
            // Mostrar menu do usuário
            const userMenu = document.getElementById('user-menu');
            const userRoleDisplay = document.getElementById('user-role-display');
            const userNameDisplay = document.getElementById('user-name-display');
            
            if (userMenu && user.username) {
                userMenu.style.display = 'block';
                userRoleDisplay.textContent = user.role === 'admin' ? 'Administrador' : 'Usuário';
                userNameDisplay.textContent = user.full_name || user.username;
            }
            
            // Mostrar link de gerenciar usuários apenas para admin (no dropdown)
            if (user.role === 'admin') {
                const usersMenuLink = document.getElementById('users-menu-link');
                const usersMenuDivider = document.getElementById('users-menu-divider');
                if (usersMenuLink) {
                    usersMenuLink.style.display = 'flex';
                }
                if (usersMenuDivider) {
                    usersMenuDivider.style.display = 'block';
                }
            }
        })();
        
        function logout() {
            if (confirm('Deseja realmente sair?')) {
                localStorage.removeItem('access_token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            }
        }
        
        // Controle do menu dropdown do usuário
        function toggleUserMenu() {
            const userMenu = document.getElementById('user-menu');
            userMenu.classList.toggle('active');
        }
        
        // Fechar dropdown ao clicar fora
        document.addEventListener('click', (event) => {
            const userMenu = document.getElementById('user-menu');
            if (userMenu && !userMenu.contains(event.target)) {
                userMenu.classList.remove('active');
            }
        });
        
        // Funções do modal de trocar senha
        function openChangePasswordModal() {
            document.getElementById('change-password-modal').classList.add('active');
            document.getElementById('change-password-form').reset();
            toggleUserMenu(); // Fechar o dropdown
            
            // Focar no primeiro campo após um pequeno delay
            setTimeout(() => {
                document.getElementById('current-password').focus();
            }, 100);
        }
        
        function closeChangePasswordModal() {
            document.getElementById('change-password-modal').classList.remove('active');
            
            // Resetar os campos e os ícones
            const newPasswordField = document.getElementById('new-password');
            const confirmPasswordField = document.getElementById('confirm-new-password');
            const icons = document.querySelectorAll('#change-password-form .password-toggle-icon');
            
            if (newPasswordField && confirmPasswordField) {
                newPasswordField.type = 'password';
                confirmPasswordField.type = 'password';
                icons.forEach(icon => icon.textContent = '👁️');
            }
        }
        
        function toggleChangePasswordVisibility() {
            const newPasswordField = document.getElementById('new-password');
            const confirmPasswordField = document.getElementById('confirm-new-password');
            const icons = document.querySelectorAll('#change-password-form .password-toggle-icon');
            
            // Alternar tipo de ambos os campos (nova senha e confirmação)
            if (newPasswordField.type === 'password') {
                newPasswordField.type = 'text';
                confirmPasswordField.type = 'text';
                // Atualizar todos os ícones
                icons.forEach(icon => icon.textContent = '🙈'); // Olho fechado
            } else {
                newPasswordField.type = 'password';
                confirmPasswordField.type = 'password';
                // Atualizar todos os ícones
                icons.forEach(icon => icon.textContent = '👁️'); // Olho aberto
            }
        }
        
        async function changePassword(event) {
            event.preventDefault();
            
            const currentPassword = document.getElementById('current-password').value.trim();
            const newPassword = document.getElementById('new-password').value.trim();
            const confirmPassword = document.getElementById('confirm-new-password').value.trim();
            
            // Validar senhas
            if (newPassword !== confirmPassword) {
                alert('As senhas não coincidem');
                return;
            }
            
            if (newPassword.length < 8) {
                alert('A nova senha deve ter no mínimo 8 caracteres');
                return;
            }
            
            // Validar força da senha
            if (!/[a-zA-Z]/.test(newPassword)) {
                alert('A senha deve conter pelo menos uma letra');
                return;
            }
            
            if (!/[0-9]/.test(newPassword)) {
                alert('A senha deve conter pelo menos um número');
                return;
            }
            
            if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(newPassword)) {
                alert('A senha deve conter pelo menos um caractere especial (!@#$%^&*()_+-=[]{};\':"|,.<>/?)');
                return;
            }
            
            try {
                const token = localStorage.getItem('access_token');
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                
                const response = await fetch('/api/auth/change-password', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword
                    })
                });
                
                if (response.ok) {
                    alert('Senha alterada com sucesso!');
                    closeChangePasswordModal();
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Erro ao alterar senha');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao alterar senha');
            }
        }
        
        // Aplicar modo de leitura para usuários não-admin
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof applyReadOnlyMode === 'function') {
                applyReadOnlyMode();
            }
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
