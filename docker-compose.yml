version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orcamento-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Persistir banco de dados
      - ./data:/app/data
      # Logs (opcional, para debug)
      - ./logs/nginx:/var/log/nginx
      - ./logs/uvicorn:/var/log/uvicorn
      - ./logs/supervisor:/var/log/supervisor
    environment:
      # Variáveis de ambiente (ajuste conforme necessário)
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./data/condominio_orcamento.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - orcamento-network

networks:
  orcamento-network:
    driver: bridge

volumes:
  data:
    driver: local

